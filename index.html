<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ai Daily By Jarvis - Control Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      border-bottom: 1px solid #00d4ff33;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .logo-text p {
      font-size: 12px;
      color: #00d4ff;
      font-weight: 500;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ffffff08;
      border: 1px solid #ffffff15;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }

    .status-dot.active {
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Main */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Cards grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #111120;
      border: 1px solid #ffffff10;
      border-radius: 14px;
      padding: 20px;
    }

    .card h3 {
      font-size: 13px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    /* Control card */
    .control-card {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .time-input {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
    }

    .time-input label {
      font-size: 14px;
      color: #94a3b8;
      white-space: nowrap;
    }

    .time-input input {
      background: #0a0a0f;
      border: 1px solid #ffffff20;
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 15px;
      width: 120px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-start {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
    }

    .btn-stop {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
    }

    .btn-post {
      background: linear-gradient(135deg, #00d4ff, #7c3aed);
      color: #fff;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Stats */
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: #64748b;
    }

    .stat-highlight { color: #00d4ff; }

    /* Manual post */
    .manual-card {
      grid-column: 1 / -1;
    }

    .topic-input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topic-input-row input {
      flex: 1;
      min-width: 200px;
      background: #0a0a0f;
      border: 1px solid #ffffff20;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 14px;
    }

    .topic-input-row input::placeholder { color: #475569; }

    /* History */
    .history-card {
      grid-column: 1 / -1;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 400px;
      overflow-y: auto;
    }

    .history-item {
      background: #0a0a0f;
      border: 1px solid #ffffff08;
      border-radius: 10px;
      padding: 14px;
      border-left: 3px solid #334155;
    }

    .history-item.success { border-left-color: #22c55e; }
    .history-item.failed { border-left-color: #ef4444; }
    .history-item.generating { border-left-color: #f59e0b; }
    .history-item.posting { border-left-color: #00d4ff; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .history-topic {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
    }

    .history-time {
      font-size: 11px;
      color: #475569;
    }

    .history-status {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .history-status.success { background: #22c55e20; color: #22c55e; }
    .history-status.failed { background: #ef444420; color: #ef4444; }
    .history-status.generating { background: #f59e0b20; color: #f59e0b; }
    .history-status.posting { background: #00d4ff20; color: #00d4ff; }

    .history-preview {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a2e;
      border: 1px solid #00d4ff33;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 14px;
      color: #e2e8f0;
      z-index: 1000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      max-width: 300px;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-color: #22c55e55; }
    .toast.error { border-color: #ef444455; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ffffff40;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: #475569;
      font-size: 14px;
    }

    .next-topic {
      font-size: 13px;
      color: #00d4ff;
      margin-top: 8px;
      padding: 8px 12px;
      background: #00d4ff10;
      border-radius: 8px;
      border: 1px solid #00d4ff20;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text">
        <h1>Ai Daily By Jarvis</h1>
        <p>Auto Poster Dashboard</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Inactive</span>
    </div>
  </div>

  <div class="container">
    <div class="grid">

      <!-- Control Card -->
      <div class="card control-card">
        <h3>⚙️ Auto Posting Control</h3>
        <div class="time-input">
          <label>Post Time (IST):</label>
          <input type="time" id="postTime" value="09:00" />
        </div>
        <div class="btn-group">
          <button class="btn btn-start" onclick="startPosting()">▶ Start Auto</button>
          <button class="btn btn-stop" onclick="stopPosting()">⏹ Stop</button>
        </div>
        <div id="nextTopic" class="next-topic" style="width:100%">
          Next: Loading...
        </div>
      </div>

      <!-- Stats -->
      <div class="card">
        <h3>📊 Total Posts</h3>
        <div class="stat-value" id="totalPosts">0</div>
        <div class="stat-label">Posts generated</div>
      </div>

      <div class="card">
        <h3>📢 Channel</h3>
        <div class="stat-value stat-highlight" id="channelId" style="font-size:18px;margin-top:8px">-</div>
        <div class="stat-label">Telegram Channel</div>
      </div>

      <!-- Manual Post -->
      <div class="card manual-card">
        <h3>✍️ Manual Post</h3>
        <div class="topic-input-row">
          <input type="text" id="manualTopic" placeholder="Topic likho ya khali chhodo (auto topic use hoga)" />
          <button class="btn btn-post" onclick="postNow()" id="postBtn">🚀 Post Now</button>
        </div>
      </div>

      <!-- History -->
      <div class="card history-card">
        <h3>📋 Post History</h3>
        <div class="history-list" id="historyList">
          <div class="empty-state">Abhi tak koi post nahi hua 🤖</div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Fetch status
    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();

        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');

        if (data.isAutoPosting) {
          dot.classList.add('active');
          text.textContent = `Active • ${data.postTime} IST`;
        } else {
          dot.classList.remove('active');
          text.textContent = 'Inactive';
        }

        document.getElementById('totalPosts').textContent = data.totalPosts;
        document.getElementById('channelId').textContent = data.channel;
        document.getElementById('nextTopic').textContent = '⚡ Next: ' + data.nextTopic;
        document.getElementById('postTime').value = data.postTime;
      } catch (e) {}
    }

    // Fetch history
    async function fetchHistory() {
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        const list = document.getElementById('historyList');

        if (!data.length) {
          list.innerHTML = '<div class="empty-state">Abhi tak koi post nahi hua 🤖</div>';
          return;
        }

        list.innerHTML = data.map(item => `
          <div class="history-item ${item.status}">
            <div class="history-header">
              <div class="history-topic">${item.topic}</div>
              <div style="display:flex;gap:8px;align-items:center">
                <span class="history-status ${item.status}">${item.status}</span>
                <span class="history-time">${item.time}</span>
              </div>
            </div>
            ${item.content ? `<div class="history-preview">${item.content.substring(0, 150)}...</div>` : ''}
            ${item.error ? `<div style="font-size:11px;color:#ef4444;margin-top:4px">Error: ${item.error}</div>` : ''}
          </div>
        `).join('');
      } catch (e) {}
    }

    // Start auto posting
    async function startPosting() {
      const time = document.getElementById('postTime').value;
      const res = await fetch('/api/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ time })
      });
      const data = await res.json();
      showToast(data.message, 'success');
      fetchStatus();
    }

    // Stop auto posting
    async function stopPosting() {
      const res = await fetch('/api/stop', { method: 'POST' });
      const data = await res.json();
      showToast(data.message, 'error');
      fetchStatus();
    }

    // Manual post
    async function postNow() {
      const topic = document.getElementById('manualTopic').value;
      const btn = document.getElementById('postBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Posting...';

      try {
        const res = await fetch('/api/post-now', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: topic || null })
        });
        const data = await res.json();

        if (data.status === 'success') {
          showToast('✅ Post successfully bhej diya!', 'success');
          document.getElementById('manualTopic').value = '';
        } else {
          showToast('❌ Error: ' + (data.error || 'Post failed'), 'error');
        }

        fetchHistory();
        fetchStatus();
      } catch (e) {
        showToast('❌ Server error', 'error');
      }

      btn.disabled = false;
      btn.innerHTML = '🚀 Post Now';
    }

    // Toast
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => { toast.className = 'toast'; }, 3500);
    }

    // Auto refresh
    fetchStatus();
    fetchHistory();
    setInterval(() => {
      fetchStatus();
      fetchHistory();
    }, 5000);
  </script>
</body>
</html>
